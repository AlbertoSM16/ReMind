spring.application.name=backend

# CONFIGURACION DE BASE DE DATOS MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/remind
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACION DE HIBERNATE / JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# DIFERIR LA INICIALIZACION DEL DATASOURCE PARA QUE HIBERNATE CREE LAS TABLAS ANTES DE EJECUTAR DATA.SQL
spring.jpa.defer-datasource-initialization=true

server.address=0.0.0.0
jwt.secret=EstaEsUnaClaveSecretaMuchoMasSeguraYExternalizadaParaHS256!12345
