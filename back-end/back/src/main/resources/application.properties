spring.application.name=backend

# CONFIGURACION DE BASE DE DATOS H2 EN MEMORIA
spring.datasource.url=jdbc:h2:mem:reminddb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# HABILITAR CONSOLA H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# CONFIGURACION DE HIBERNATE / JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# DIFERIR LA INICIALIZACION DEL DATASOURCE PARA QUE HIBERNATE CREE LAS TABLAS ANTES DE EJECUTAR DATA.SQL
spring.jpa.defer-datasource-initialization=true

server.address=0.0.0.0