<div class="login-wrapper">
  <div class="login-card">
    <img src="assets/img/logo.png" alt="Logo ReMind" class="logo" />

    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="login-form">

      <div *ngIf="submitted && loginForm.invalid" class="form-error-banner">
        <i class="pi pi-exclamation-circle"></i> Corrige los errores marcados antes de continuar.
      </div>

      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input
          type="text"
          id="usuario"
          name="usuario"
          placeholder="Escribe tu usuario"
          [(ngModel)]="credentials.usuario"
          required
          #usuario="ngModel"
          class="form-control"
          autocomplete="username"
          [class.ng-invalid]="usuario.invalid && (usuario.dirty || usuario.touched)"
        />
        <div *ngIf="usuario.invalid && (usuario.dirty || usuario.touched)" class="field-error">
          El usuario es obligatorio.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="contrasenia"
          placeholder="Escribe tu contraseña"
          [(ngModel)]="credentials.contrasenia"
          required
          #contrasenia="ngModel"
          class="form-control"
          autocomplete="current-password"
          [class.ng-invalid]="contrasenia.invalid && (contrasenia.dirty || contrasenia.touched)"
        />
        <div *ngIf="contrasenia.invalid && (contrasenia.dirty || contrasenia.touched)" class="field-error">
          La contraseña es obligatoria.
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-message" role="alert">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner"></span>
        <span *ngIf="!isLoading">INICIAR SESIÓN</span>
      </button>
    </form>
  </div>
</div>
