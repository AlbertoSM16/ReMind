<div class="login-wrapper">
  <div class="login-card">
    <img src="assets/img/logo.png" alt="logo" class="logo mb-4" />

    <form (ngSubmit)="onSubmit()">
      <div class="form-group mb-3">
        <label for="usuario" class="form-label">Usuario</label>
        <input
          type="text"
          id="usuario"
          name="usuario"
          class="form-control"
          placeholder="Usuario"
          [(ngModel)]="credentials.usuario"
          required
        />
      </div>

      <div class="form-group mb-4">
        <label for="access-code" class="form-label">Código de Acceso</label>
        <input
          type="password"
          id="access-code"
          name="codigoAcceso"
          class="form-control"
          placeholder="Código de Acceso"
          [(ngModel)]="credentials.codigoAcceso"
          required
        />
      </div>
      
      <div *ngIf="errorMessage" class="alert alert-danger mt-3">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-login">INICIAR SESION</button>
    </form>
  </div>
</div>
