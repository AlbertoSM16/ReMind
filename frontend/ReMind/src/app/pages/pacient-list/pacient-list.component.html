<header-component></header-component>
<div class="container my-5">





  <div>

    <nav-component></nav-component>
  </div>
  <h2 class="text-center mb-4">Listado de pacientes</h2>

  <div class="text-center mb-5">
    <button class="btn add-patient-btn" (click)="goToCreatePatient()">Añadir paciente</button>
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    <div class="col">
      <div class="patient-card shadow-sm">
        <div class="d-flex justify-content-end mb-2">
          <i class="bi bi-pencil-square edit-icon me-2"></i>
          <i class="bi bi-x-circle delete-icon"></i>
        </div>
        <div class="d-flex align-items-center">
          <img src="https://via.placeholder.com/60" alt="Patient Avatar" class="patient-avatar me-3">
          <div class="patient-details flex-grow-1">
            <div class="name-placeholder"></div>
            <div class="line-placeholder"></div>
            <div class="line-placeholder"></div>
          </div>
        </div>
      </div>
    </div>


  </div>
</div>
