<div class="header-container">
  <button class="header-btn left-btn" (click)="goHome()" aria-label="Volver al inicio">
    <i class="pi pi-arrow-circle-left"></i>
    <span class="header-btn-label">Inicio</span>
  </button>

  <img src="/assets/img/logo.png" alt="ReMind" class="logo" />

  <button class="header-btn right-btn" (click)="logout()" aria-label="Cerrar sesión">
    <img src="/assets/img/log_out.png" alt="Salir" class="logout-icon" />
    <span class="header-btn-label">Salir</span>
  </button>
</div>
