<div class="sentence-game-container">
  <h2>Completa la Oración</h2>
  <p>Elige la palabra correcta para que la oración tenga sentido.</p>

  <div *ngIf="!gameOver && currentRoundData" class="game-area">
    <div class="sentence-display">
      <span>{{ currentRoundData.start }}</span>
      <span class="placeholder">
        {{ selectedOption ? selectedOption.word : '_____' }}
      </span>
      <span>{{ currentRoundData.end }}</span>
    </div>

    <div class="options-container">
      <button *ngFor="let option of shuffledOptions"
              (click)="selectOption(option)"
              [disabled]="selectedOption !== null"
              [ngClass]="{
                'correct': option === selectedOption && isAnswerCorrect,
                'incorrect': option === selectedOption && !isAnswerCorrect,
                'disabled': selectedOption !== null && option !== selectedOption
              }">
        {{ option.word }}
      </button>
    </div>

    <div *ngIf="selectedOption" class="feedback-area">
      <p [ngClass]="{'text-correct': isAnswerCorrect, 'text-incorrect': !isAnswerCorrect}">
        {{ feedbackMessage }}
      </p>
      <button class="next-button" (click)="loadNextRound()">Siguiente</button>
    </div>
  </div>

  <div *ngIf="gameOver" class="game-over-area">
    <h3>¡Juego Finalizado!</h3>
    <p>{{ feedbackMessage }}</p>
    <button (click)="startGame()">Volver a Jugar</button>
  </div>
</div>
