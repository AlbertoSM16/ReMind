<div class="sentence-game-container">
  <div class="game-header">
    <h1 class="game-title">{{ title }}</h1>
    <button class="btn-instrucciones" (click)="mostrarInstrucciones()">
      <i class="pi pi-info-circle"></i> Instrucciones
    </button>
  </div>

  <div *ngIf="!gameOver && currentRoundData" class="game-area">
    <div class="sentence-display">
      <span class="sentence-start">{{ currentRoundData.start }}</span>
      <span class="sentence-blank">
        {{ selectedOption ? selectedOption.word : '_____' }}
      </span>
      <span class="sentence-end">{{ currentRoundData.end }}</span>
    </div>

    <div class="options-grid">
      <button *ngFor="let option of shuffledOptions"
              (click)="selectOption(option)"
              [disabled]="selectedOption !== null"
              [ngClass]="{
                'btn-correct': option === selectedOption && isAnswerCorrect,
                'btn-incorrect': option === selectedOption && !isAnswerCorrect,
                'btn-disabled': selectedOption !== null && option !== selectedOption
              }">
        {{ option.word }}
      </button>
    </div>

    <div *ngIf="selectedOption" class="feedback-area">
      <p [ngClass]="{'text-success': isAnswerCorrect, 'text-danger': !isAnswerCorrect}">
        {{ feedbackMessage }}
      </p>
      <button class="btn-next" (click)="loadNextRound()">
        Siguiente <i class="bi bi-arrow-right"></i>
      </button>
    </div>
  </div>

  <div *ngIf="gameOver" class="game-over-area">
    <h3>¡Juego Finalizado!</h3>
    <p>{{ feedbackMessage }}</p>
    <button class="btn-play-again" (click)="startGame()">Volver a Jugar</button>
  </div>
</div>

<app-instrucciones-modal
  [titulo]="title"
  [texto]="modalTexto"
  [audioSrc]="'assets/sentence/instrucciones.mp3'"
  [(visible)]="modalVisible">
</app-instrucciones-modal>
