<div class="container my-4">
  <div class="card shadow-lg p-4 mb-4 bg-info text-white text-center">
    <h1 class="card-title display-4">{{ title }}</h1>
    <p class="card-text lead">
      ¡Memoriza el orden de las imágenes y repítelo!
    </p>
  </div>

  <div class="row justify-content-center mb-4">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm p-3">
        <div class="card-body text-center">
          <p class="fs-4 mb-3">{{ message }}</p>
          <button (click)="startGame()" class="btn btn-primary btn-lg mt-3" [disabled]="gameStarted">
            <i class="bi bi-play-fill me-2"></i> Empezar Juego
          </button>
          <button (click)="resetGame()" class="btn btn-secondary btn-lg mt-3 ms-2">
            <i class="bi bi-arrow-clockwise me-2"></i> Reiniciar
          </button>
        </div>
      </div>
    </div>
  </div>

  <hr class="my-4" />

  <div class="text-center mb-3">
    <h2 class="text-secondary">Imágenes del Juego</h2>
  </div>
  <div class="d-flex flex-wrap justify-content-center game-board">
    <div *ngFor="let image of images" class="image-card" (click)="selectImage(image.id)">
      <img
        [src]="image.flipped ? 'assets/img/back.png' : image.src"
        alt="Game Image"
        [class.flipped]="image.flipped"
        [class.unflipped]="!image.flipped"
      />
    </div>
  </div>
</div>
