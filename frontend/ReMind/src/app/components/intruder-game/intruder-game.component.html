<div class="intruder-game-container">
  <h2>Encuentra la Palabra Intrusa</h2>
  <p>De las palabras, haz clic en la que no guarda relación con las otras.</p>

  <div *ngIf="!gameOver && currentSet" class="game-area">
    <div class="options-container">
      <div *ngFor="let option of shuffledOptions"
           class="option-card"
           (click)="selectOption(option)"
           [ngClass]="{
             'selected': option === selectedOption,
             'correct': option === selectedOption && isCorrect,
             'incorrect': option === selectedOption && !isCorrect,
             'disabled': selectedOption !== null
           }">
        {{ option.word }}
      </div>
    </div>

    <div *ngIf="selectedOption" class="feedback-container">
      <p [ngClass]="{'text-correct': isCorrect, 'text-incorrect': !isCorrect}">
        {{ feedbackMessage }}
      </p>
      <button (click)="loadNextRound()">Siguiente Ronda</button>
    </div>
  </div>

  <div *ngIf="gameOver" class="game-over-container">
    <h3>Juego Terminado</h3>
    <p>{{ feedbackMessage }}</p>
    <button (click)="startGame()">Jugar de Nuevo</button>
  </div>
</div>
