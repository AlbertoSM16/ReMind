<div class="matching-game-container">
  <h1>Juego de Unir Parejas</h1>
  <p>Arrastra cada objeto a la persona correspondiente para formar una pareja.</p>

  <div class="game-area">
    <div class="unmatched-images" cdkDropList>
        <h2>Imágenes para unir</h2>
        <div class="image-list">
             <div *ngFor="let image of getUnmatchedImages()"
                 class="image-item"
                 draggable="true"
                 (dragstart)="onDragStart($event, image)">
                <img [src]="image.src" [alt]="image.name">
                <p>{{image.name}}</p>
            </div>
        </div>
    </div>

    <div class="drop-zones">
      <h2>Zonas para unir</h2>
      <div *ngFor="let zone of dropZones"
           class="drop-zone"
           [class.correct]="zone.correct"
           (dragover)="onDragOver($event)"
           (drop)="onDrop($event, zone)">
        <div class="placeholder person-placeholder">
          <img *ngIf="zone.person" [src]="zone.person.src" [alt]="zone.person.name">
          <span *ngIf="!zone.person">Persona</span>
        </div>
        <div class="placeholder item-placeholder">
          <img *ngIf="zone.item" [src]="zone.item.src" [alt]="zone.item.name">
          <span *ngIf="!zone.item">Objeto</span>
        </div>
        <div *ngIf="zone.correct" class="feedback">¡Correcto!</div>
      </div>
    </div>
  </div>

  <div *ngIf="gameOver" class="game-over">
    <h2>{{ successMessage }}</h2>
    <button (click)="resetGame()">Jugar de nuevo</button>
  </div>

  <div *ngIf="!gameOver">
      <button (click)="resetGame()">Reiniciar Juego</button>
  </div>
</div>
